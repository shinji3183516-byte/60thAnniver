<!DOCTYPE html>
<html lang="ja">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   高岡工場 60th Anniversary Timeline
  </title>
  <link href="style.css?v=20260705-float-half-v5" rel="stylesheet"/>
  <script defer="" src="script.js?v=20260705-float-half-v5">
  </script>
 </head>
 <body>
  <main class="page">
   <header class="header">
    <div class="title-area">
     <img alt="トヨタマーク" class="mark" src="images/factory/toyotamark.jpg?v=20260612"/>
     <div>
      <h1>
       <span>
        高岡工場 60th Anniversary
       </span>
       TIMELINE 1966-2026
      </h1>
     </div>
    </div>
    <div aria-label="年表操作" class="header-actions">
     <details class="header-uploader">
      <summary>写真・文章を追加</summary>
      <div class="header-uploader-menu">
       <div class="header-uploader-topline">
        <strong>選択中の年代へ一時追加</strong>
        <small id="editorYearLabel">1966年に追加</small>
       </div>
       <div class="editor-grid">
        <label>
         追加先
         <select id="editorTarget">
          <option value="car">車紹介</option>
          <option value="plant">工場の出来事</option>
          <option value="society">社会の出来事</option>
         </select>
        </label>
        <label>
         写真追加（最大3枚）
         <input accept="image/*" id="editorImages" multiple type="file"/>
        </label>
        <label class="editor-text-label">
         文章追加
         <textarea id="editorText" placeholder="選択中の年代に追加する文章" rows="2"></textarea>
        </label>
        <div class="editor-buttons">
         <button id="addEditorText" type="button">文章を追加</button>
         <button id="clearEditorAdditions" type="button">一時追加をリセット</button>
        </div>
       </div>
       <p class="editor-note">ブラウザ内への一時追加です。正式保存する場合は画像をimagesフォルダへ入れ、script.jsへ画像パスを追加してください。</p>
      </div>
     </details>
     <div aria-label="年表の速度切替" class="speed-control">
      <button class="speed-button" data-speed="verySlow" type="button">
       より遅い
      </button>
      <button class="speed-button" data-speed="slow" type="button">
       遅い
      </button>
      <button class="speed-button active" data-speed="normal" type="button">
       普通
      </button>
     </div>
     <div aria-label="年表の再生操作" class="play-control">
      <button class="control-button" id="pauseButton" type="button">
       停止
      </button>
      <button class="control-button" id="playButton" type="button">
       再開
      </button>
     </div>
     <!-- 高岡60周年公式ロゴ　無断使用・転載・転用禁止 -->
     <img alt="高岡工場60周年ロゴ" class="archive-logo" src="images/factory/60thLOGO.png"/>
    </div>
   </header>
   <section aria-label="自動スクロール年表" class="timeline-frame" id="timelineFrame">
    <div aria-hidden="true" class="center-line">
    </div>
    <div class="track-mask">
     <div class="timeline-track" id="timelineTrack">
     </div>
    </div>
    <p class="pause-note">
     年表にマウスを乗せると、年表と下の表示が同時に止まります
    </p>
   </section>
   <div aria-label="歴代車走行ステージ" class="drive-stage drive-stage-full" id="driveStage">
    <div aria-hidden="true" class="drive-bg">
    </div>
    <div aria-hidden="true" class="weather-effects">
     <div class="weather-clouds"></div>
     <div class="weather-rain"></div>
     <div class="weather-night-lights"></div>
    </div>
    <div aria-hidden="true" class="drive-cars" id="driveCars">
     <div class="drive-car-slot car-slot-1966">
      <img alt="" class="drive-car car-1966" src="images/run-cars/corolla-60th.png"/>
     </div>
     <div class="drive-car-slot car-slot-1970">
      <img alt="" class="drive-car car-1970" src="images/run-cars/corolla-green.png"/>
     </div>
     <div class="drive-car-slot car-slot-1980">
      <img alt="" class="drive-car car-1980" src="images/run-cars/levin.png"/>
     </div>
     <div class="drive-car-slot car-slot-1990">
      <img alt="" class="drive-car car-1990" src="images/run-cars/prius.png"/>
     </div>
     <div class="drive-car-slot car-slot-2000">
      <img alt="" class="drive-car car-2000" src="images/run-cars/iQ.png"/>
     </div>
     <div class="drive-car-slot car-slot-2010">
      <img alt="" class="drive-car car-2010" src="images/run-cars/hayy.png"/>
     </div>
     <div class="drive-car-slot car-slot-2020">
      <img alt="" class="drive-car car-2020" src="images/run-cars/rav4-silver.png"/>
     </div>
    </div>
   </div>
   <section class="main-card">
    <div class="left-panel">
     <p class="label">
      SELECTED YEAR
     </p>
     <div class="year-line">
      <span class="big-year" id="selectedYear">
       1966
      </span>
      <span class="era-badge" id="selectedEra">
       昭和41年
      </span>
     </div>
     <h2 id="selectedTitle">
      高岡工場スタート
     </h2>
     <button class="photo-link" data-placeholder="メイン写真を追加してください" id="photoLink" type="button">
      <img alt="選択された年代の写真" id="mainPhoto"/>
      <span>
       画像を開く
      </span>
     </button>
    </div>
    <div class="right-area">
     <div class="event-grid">
      <article>
       <div class="article-content" id="carContent">
       </div>
      </article>
      <article>
       <div class="article-content" id="factoryContent">
       </div>
      </article>
      <article>
       <div class="article-content" id="societyContent">
       </div>
      </article>
     </div>
    </div>
   </section>
  </main>
  <script>
   (() => {
    const stage = document.getElementById("driveStage");
    if (!stage) return;

    const weatherModes = ["sunny", "cloudy", "night"];
    let weatherIndex = 0;

    const applyWeather = () => {
     stage.classList.remove(...weatherModes);
     stage.classList.add(weatherModes[weatherIndex]);
     weatherIndex = (weatherIndex + 1) % weatherModes.length;
    };

    applyWeather();
    window.setInterval(applyWeather, 30000);
   })();
  </script>
 </body>
</html>
